name: Pull request CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assurance-validation:
    name: Supply-chain unit and contract validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check out current canonical contracts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: AtlasReaper311/atlas-infra
          path: .atlas-infra
          persist-credentials: false

      - name: Compile and run offline assurance tests
        env:
          ATLAS_INFRA_ROOT: ${{ github.workspace }}/.atlas-infra
        run: |
          python3 -m py_compile audit.py contract_validation.py doc_drift.py estate.py notify.py notify_client.py secret_watch.py
          python3 -m unittest discover -s tests -v
          python3 doc_drift.py --selftest
          python3 contract_validation.py \
            --contracts-root "$ATLAS_INFRA_ROOT" \
            --repository AtlasReaper311/atlas-infra
